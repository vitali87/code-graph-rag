name: PR Split Score

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: vitali87/pr-split@main
        with:
          max-loc: "400"
