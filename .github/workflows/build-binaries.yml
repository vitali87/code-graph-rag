name: Build Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
  release:
    types: [created]

permissions: read-all

jobs:
  build:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: amd64
          - os: windows-latest
            platform: windows
            arch: amd64
          - os: macos-15-intel
            platform: darwin
            arch: amd64
          - os: macos-14
            platform: darwin
            arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: |
          uv sync --extra treesitter-full
          uv add --dev pyinstaller

      - name: Build binary
        run: uv run python build_binary.py

      - name: Test binary
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "windows" ]; then
            ./dist/code-graph-rag-${{ matrix.platform }}-${{ matrix.arch }}.exe --version
          else
            ./dist/code-graph-rag-${{ matrix.platform }}-${{ matrix.arch }} --version
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: code-graph-rag-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/code-graph-rag-*
          retention-days: 30
          compression-level: 9

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          files: dist/code-graph-rag-*
          fail_on_unmatched_files: true

  sign-release:
    name: Sign Release Artifacts
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Sign artifacts
        shell: bash
        run: |
          for f in artifacts/*; do
            [ -f "$f" ] || continue
            cosign sign-blob --yes --bundle "${f}.sigstore.json" "$f"
          done

      - name: Upload signatures to release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          files: artifacts/*.sigstore.json
          fail_on_unmatched_files: false

      - name: Generate build provenance
        id: attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            artifacts/*
            !artifacts/*.sigstore.json

      - name: Stage provenance bundle
        shell: bash
        run: cp "${{ steps.attest.outputs.bundle-path }}" artifacts/multiple.intoto.jsonl

      - name: Upload provenance to release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          files: artifacts/multiple.intoto.jsonl
          fail_on_unmatched_files: false
